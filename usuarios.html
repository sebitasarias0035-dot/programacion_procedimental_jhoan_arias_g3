<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usuario</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
</head>
<body>
  <form id="formularioUsuario">
    <div class="field">
  <label class="label">Name</label>
  <div class="control">
    <input class="input" type="text" placeholder="Text input" id="Nombre" required>
  </div>
</div>

<div class="field">
  <label class="label">apellido</label>
  <div class="control">
    <input class="input" type="text" placeholder="Text input" id="Apellido" required>
  </div>
</div>

<div class="control">
    <p>tipo de documento</p>
  <div class="select">
    <select id="Tipo_documento" required>
      <option>tarjeta de identidad</option>
      <option>cedula de ciudadania</option>
    </select>
  </div>
</div>

<div class="field is-horizontal">
  <div class="field-label"></div>
  <div class="field-body">
    <div class="field is-expanded">
      <div class="field has-addons">
        <p class="control">
          <a class="button is-static">
            +57
          </a>
        </p>
        <p class="control is-expanded">
          <input class="input" type="tel" placeholder="Your phone number" id="telefono" required>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Email</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="email" placeholder="Email input" id="correo" required>
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
</div>

<div class="control">
    <p>sexo</p>
  <div class="select">
    <select id="genero" required>
      <option>femenino</option>
      <option>masculino</option>
      <option>mucho</option>
      <option>otros</option>
    </select>
  </div>
</div>

<div class="control">
    <p>cargo</p>
  <div class="select">
    <select id="cargo" required>
      <option>cliente</option>
      <option>empleado</option>
      <option>pou</option>
    </select>
  </div>
</div>

<div class="field">
  <label class="label">Fecha de nacimiento</label>
  <div class="control">
    <input class="input" type="date" placeholder="Selecciona una fecha" id="fecha_nacimiento" required>
  </div>
</div>


<div class="field">
    <p>contraseña</p>
  <p class="control has-icons-left">
    <input class="input" type="password" placeholder="Password" id="contraseña" required>
    <span class="icon is-small is-left">
      <i class="fas fa-lock"></i>
    </span>
  </p>
</div>

<div class="field">
  <div class="control">
    <label class="checkbox">
      <input type="checkbox">
       <a href="#">terms and conditions</a>
    </label>
  </div>
</div>

<div class="field">
  <div class="control">
    <label class="radio">
      <input type="radio" name="question" required>
      Yes
    </label>
    <label class="radio">
      <input type="radio" name="question">
      No
    </label>
  </div>
</div>

<div class="field is-grouped">
      <div class="control">
         <button type="submit" class="button is-link">Enviar</button>
      </div>
      <div class="control">
        <button type="reset" class="button is-link is-light">Cancelar</button>
      </div>
    </div>
  </form>
<div class="control">
  <a href="index.html"><button class="button is-primary">volver</button></a>
</div>
<script src="./js/usuario.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
