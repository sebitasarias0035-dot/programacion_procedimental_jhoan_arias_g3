<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
</head>
<body>
    <form id="formulariopedidos">
    <h1 style="height: 30px;">FORMULARIO DE PRODUCTO</h1>

    <div class="box">
        <div class="field">
  <label class="label">nombre de usuario</label>
  <div class="control">
    <input class="input" type="text" placeholder="Tangamandapio" id="nombre">
  </div>
  <p class="help"></p>
</div>
<div class="field">
  <label class="label">producto</label>
  <div class="control">
    <input class="input" type="text" placeholder="escriba bien el nombre" id="producto">
  </div>
</div>
<div class="field">
  <label class="label">cantidad</label>
  <div class="control">
    <input class="input" type="number" placeholder="ponga los numeritos bien" id="canti">
  </div>
</div>
<div class="field">
  <label class="label">metodo de pago</label>
  <div class="control">
    <div class="select">
      <select id="pago">
        <option>seleccionelo</option>
        <option>visa</option>
        <option>daviplata</option>
        <option>bancolombia</option>
        <option>nequi</option>
      </select>
    </div>
  </div>
</div>
<div class="field">
  <div class="field-label"></div>
  <div class="field-body">
    <div class="field is-expanded">
      <div class="field has-addons">
        <p class="control">
          <a class="button is-static">
            +57
          </a>
        </p>
        <p class="control is-expanded">
          <input class="input" type="tel" placeholder="su phone numero" id="num">
        </p>
      </div>
    </div>
  </div>
</div>
<div class="field is-grouped">
      <div class="control">
         <button type="submit" class="button is-link">Enviar</button>
      </div>
      <div class="control">
  <a href="index.html"><button class="button is-primary" type="button">volver</button></a>
</div>
    </div>
  </form>
</div>

<script src="./js/pedidos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
